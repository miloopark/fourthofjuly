name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install
        run: npm ci

      - name: Resolve repo name for basePath
        id: vars
        env:
          REPO: ${{ github.repository }}
        run: |
          # GitHub validates ${{ github.repository }} to "<owner>/<name>" with
          # safe chars, but we still avoid direct ${{ }} interpolation in run:.
          name="${REPO##*/}"
          echo "name=$name" >>"$GITHUB_OUTPUT"

      - name: Build (static export)
        env:
          STATIC_EXPORT: "true"
          NEXT_PUBLIC_BASE_PATH: /${{ steps.vars.outputs.name }}
        run: npm run build

      - name: Disable Jekyll
        run: touch out/.nojekyll

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: out

  deploy:
    runs-on: ubuntu-latest
    needs: build
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
